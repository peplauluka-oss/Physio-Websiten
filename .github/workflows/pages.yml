name: Deploy to GitHub Pages (deaktiviert)

# WICHTIG: Dieser `main`-Branch enthaelt die Maler-Seite, das Physio-Repo soll
# aber ausschliesslich die Physiotherapie-Seite unter …/Physio-Websiten/
# veroeffentlichen. Der fruehere Workflow hier hat die Maler-Seite an die
# Wurzel deployt und damit die Physio-Seite ueberschrieben.
#
# Deshalb ist das automatische Deployment aus diesem Branch abgeschaltet.
# Die Maler-Seite gehoert in ihr eigenes Repository (Maler-Seite-), wo sie
# eine eigene Pages-URL (…/Maler-Seite-/) bekommt. Der fertige, eigenstaendige
# Deploy-Workflow liegt im Branch claude/heusser-maler-berlin-relaunch-374x66.
#
# Es gibt bewusst keinen Trigger und keinen Deploy-Job mehr – dieser Workflow
# tut nichts und kann die Physio-Seite nicht mehr verdraengen.

on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Hinweis
        run: |
          echo "Deployment aus dem main-Branch (Maler-Seite) ist deaktiviert."
          echo "Die Maler-Seite bitte im eigenen Repo 'Maler-Seite-' veroeffentlichen."
