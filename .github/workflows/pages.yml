name: Deploy to GitHub Pages

# Eigenständiges Deployment der Maler-Seite (Malermeister Heußer) aus `main`.
# Der Pages-Unterpfad wird automatisch aus dem Repo-Namen abgeleitet
# (next.config.mjs liest GITHUB_REPOSITORY), z. B. …github.io/Physio-Websiten/.
# GitHub Pages wird beim ersten Lauf automatisch aktiviert (configure-pages
# mit enablement: true) – es ist kein manueller Klick in den Repo-Einstellungen
# nötig.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: GitHub Pages aktivieren
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - name: Build static site
        env:
          GITHUB_PAGES: "true"
        run: npm run build
      - name: Jekyll deaktivieren
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
