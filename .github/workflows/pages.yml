name: Deploy to GitHub Pages (Maler – in diesem Repo DEAKTIVIERT)

# WICHTIG: Dieses Repo (Physio-Websiten) hostet die PHYSIO-Seite über GitHub
# Pages (Deploy aus Branch claude/physio-websiten-init-lr1lnm).
# Die Maler-Seite gehört in ihr EIGENES Repository und darf hier NICHT mehr
# deployen, sonst überschreibt sie die Physio-Seite auf derselben Pages-URL.
# Daher kein Auto-Trigger auf `main` – nur noch manuell auslösbar.
# Der aktuelle Maler-Stand liegt im Branch claude/heusser-maler-berlin-relaunch-374x66
# (dort ist der Workflow aktiv und triggert im Maler-Repo auf `main`).

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site
        env:
          GITHUB_PAGES: "true"
        run: npm run build
      - name: Jekyll deaktivieren
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
