name: Deploy to GitHub Pages

# Kombiniertes Deployment: Physio-Seite bleibt an der Wurzel
# (…/Physio-Websiten/), die Maler-Seite kommt in den Unterpfad
# (…/Physio-Websiten/maler-heusser/). Beide werden in EIN Pages-Artefakt
# gebaut und gemeinsam veröffentlicht.

on:
  push:
    branches:
      - claude/heusser-maler-berlin-relaunch-374x66
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ---- Maler-Seite (Unterpfad /maler-heusser) ----
      - name: Checkout Maler-Branch
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Maler-Abhängigkeiten
        run: npm ci
      - name: Maler-Seite bauen (Unterpfad)
        env:
          GITHUB_PAGES: "true"
          PAGES_BASE_PATH: "/Physio-Websiten/maler-heusser"
        run: npm run build
      - name: Maler-Output einsammeln
        run: |
          mkdir -p combined/maler-heusser
          cp -r out/. combined/maler-heusser/
          rm -rf out .next

      # ---- Physio-Seite (Wurzel) ----
      - name: Checkout Physio-Branch
        uses: actions/checkout@v4
        with:
          ref: claude/physio-websiten-init-lr1lnm
          path: physio-src
      - name: Physio bauen (Wurzel)
        working-directory: physio-src
        env:
          GITHUB_PAGES: "true"
        run: |
          npm ci
          npm run build
      - name: Physio-Output an die Wurzel
        run: |
          cp -r physio-src/out/. combined/
          touch combined/.nojekyll

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
